{% extends 'construction/base_construction.html' %}


{% block content %}



<div class="d-flex justify-content-between">


<h2>
Tasks
</h2>


<a href="{% url 'task_create' %}"
class="btn btn-primary">

+ Add Task

</a>


</div>



<div class="card shadow mt-3">


<table class="table">


<tr>

<th>
Task
</th>

<th>
Project
</th>

<th>
Assigned To
</th>

<th>
Status
</th>

<th>
Progress
</th>


</tr>



{% for task in tasks %}


<tr>


<td>
{{task.title}}
</td>


<td>
{{task.project.name}}
</td>


<td>
{{task.assigned_to}}
</td>


<td>

<span class="badge bg-info">

{{task.status}}

</span>


</td>


<td>


<div class="progress">


<div class="progress-bar"
style="width:{{task.progress}}%">


{{task.progress}}%


</div>


</div>


</td>



</tr>



{% empty %}


<tr>

<td colspan="5">

No Tasks

</td>

</tr>


{% endfor %}


</table>


</div>



{% endblock %}
