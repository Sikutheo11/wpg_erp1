{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>
{% block title %}
Construction
{% endblock %}
</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">


</head>


<body class="bg-light">


<div class="d-flex">


<!-- SIDEBAR -->

<div class="bg-dark text-white p-3"
style="width:270px; min-height:100vh;">


<h4 class="mb-4">

<i class="bi bi-building"></i>

Construction

</h4>



<a href="{% url 'construction_dashboard' %}"
class="btn btn-dark w-100 text-start mb-2">

<i class="bi bi-speedometer2"></i>
Dashboard

</a>



<hr>


<h6 class="text-secondary">
Projects
</h6>


<a href="{% url 'project_list' %}"
class="btn btn-dark w-100 text-start">

Projects

</a>



<a href="{% url 'project_create' %}"
class="btn btn-dark w-100 text-start">

+ New Project

</a>



<hr>


<h6 class="text-secondary">
Management
</h6>


<a href="{% url 'site_list' %}"
class="btn btn-dark w-100 text-start">

Sites

</a>


<a href="{% url 'task_list' %}"
class="btn btn-dark w-100 text-start">

Tasks

</a>



<a href="{% url 'material_usage_list' %}"
class="btn btn-dark w-100 text-start">

Materials

</a>



<a href="{% url 'asset_usage_list' %}"
class="btn btn-dark w-100 text-start">

Equipment

</a>



<a href="{% url 'labour_list' %}"
class="btn btn-dark w-100 text-start">

Labour

</a>



<a href="{% url 'expense_list' %}"
class="btn btn-dark w-100 text-start">

Expenses

</a>



<hr>



<h6 class="text-secondary">
Reports
</h6>


<a href="{% url 'project_cost_report' %}"
class="btn btn-dark w-100 text-start">

Cost Report

</a>



</div>



<!-- CONTENT -->


<div class="flex-grow-1 p-4">


{% block content %}

{% endblock %}


</div>


</div>



</body>

</html>
