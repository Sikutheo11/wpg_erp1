{% extends 'construction/base_construction.html' %}



{% block content %}


<div class="d-flex justify-content-between">


<h2>
Projects
</h2>


<a href="{% url 'project_create' %}"
class="btn btn-primary">

+ New Project

</a>


</div>




<div class="card shadow mt-3">


<table class="table table-striped">


<tr>

<th>Code</th>
<th>Name</th>
<th>Client</th>
<th>Budget</th>
<th>Status</th>
<th></th>

</tr>



{% for project in projects %}


<tr>


<td>
{{project.code}}
</td>


<td>

<a href="{% url 'project_detail' project.id %}">

{{project.name}}

</a>

</td>


<td>

{{project.client_name}}

</td>


<td>

{{project.budget}}

</td>


<td>

{{project.status}}

</td>


<td>


<a href="{% url 'project_update' project.id %}"
class="btn btn-sm btn-warning">

Edit

</a>


</td>


</tr>



{% endfor %}



</table>


</div>



{% endblock %}
