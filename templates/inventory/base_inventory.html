{% load static %}

<!DOCTYPE html>
<html>

<head>

<title>
{% block title %}
Inventory
{% endblock %}
</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>


<body class="bg-light">
<div class="d-flex">

<!-- SIDEBAR -->

<div class="bg-dark text-white p-3"
style="width:260px; min-height:100vh;"><h4 class="mb-4">
<i class="bi bi-box-seam"></i>
Inventory
</h4>



<a href="{% url 'inventory_dashboard' %}"
class="btn btn-dark w-100 text-start mb-2">

<i class="bi bi-speedometer"></i>
Dashboard

</a>



<h6 class="text-secondary mt-3">
Materials
</h6>


<a href="{% url 'material_list' %}"
class="btn btn-dark w-100 text-start">

<i class="bi bi-tree"></i>
Raw Materials

</a>


<a href="{% url 'material_create' %}"
class="btn btn-dark w-100 text-start">

+ Add Material

</a>




<h6 class="text-secondary mt-3">
Products
</h6>


<a href="{% url 'product_list' %}"
class="btn btn-dark w-100 text-start">

<i class="bi bi-box"></i>
Products

</a>




<h6 class="text-secondary mt-3">
Assets
</h6>


<a href="{% url 'asset_list' %}"
class="btn btn-dark w-100 text-start">

<i class="bi bi-tools"></i>
Assets

</a>




<h6 class="text-secondary mt-3">
Stock
</h6>


<a href="{% url 'movement_list' %}"
class="btn btn-dark w-100 text-start">

<i class="bi bi-arrow-left-right"></i>
Movements

</a>



</div>



<!-- CONTENT -->

<div class="flex-grow-1 p-4">


{% block content %}

{% endblock %}


</div>


</div>


</body>

</html>
