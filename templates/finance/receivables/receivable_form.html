{% extends "base_dashboard.html" %}


{% block title %}
Receivable Form
{% endblock %}



{% block content %}


<div class="container py-4">


<div class="card shadow">


<div class="card-body">


<h3 class="mb-4">

👥 Customer Receivable

</h3>



<form method="POST">


{% csrf_token %}



<div class="row">


{% for field in form %}


<div class="col-md-6 mb-3">


<label class="form-label">

{{field.label}}

</label>


{{field}}


{% if field.errors %}

<div class="text-danger">

{{field.errors}}

</div>

{% endif %}


</div>


{% endfor %}


</div>




<button class="btn btn-success">

Save Receivable

</button>



<a href="{% url 'finance:receivable_list' %}"
class="btn btn-secondary">

Cancel

</a>



</form>


</div>


</div>


</div>


{% endblock %}
