{% extends 'sales/base_sales.html'%}

{% block content %}

<div class="card">

    <div class="card-header d-flex justify-content-between">

        <h4>Sales</h4>

        <a href="{% url 'sale_create' %}"
           class="btn btn-primary">

           New Sale

        </a>

    </div>

    <div class="card-body">

        <table class="table table-striped">

            <thead>

                <tr>
                    <th>Sale No</th>
                    <th>Customer</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th></th>
                </tr>

            </thead>

            <tbody>

            {% for sale in sales %}

                <tr>

                    <td>{{ sale.sale_no }}</td>

                    <td>{{ sale.customer }}</td>

                    <td>{{ sale.sale_date }}</td>

                    <td>{{ sale.total_amount }}</td>

                    <td>{{ sale.status }}</td>

                    <td>

                        <a href="{% url 'sale_detail' sale.id %}"
                           class="btn btn-sm btn-info">

                           View

                        </a>

                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
