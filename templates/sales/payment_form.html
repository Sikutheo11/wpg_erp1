{% extends 'sales/base_sales.html'%}

{% block content %}

<div class="card">

    <div class="card-header">

        <h4>Record Payment</h4>

    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-success">

                Save Payment

            </button>

        </form>

    </div>

</div>

{% endblock %}
