{% extends 'sales/base_sales.html'%}

{% block content %}

<div class="card">

    <div class="card-header">
        <h4>Create Customer</h4>
    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                class="btn btn-success"
                type="submit">

                Save

            </button>

        </form>

    </div>

</div>

{% endblock %}
