{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: url("{% static 'img/bg.jpg' %}") no-repeat center center/cover;
            font-family: Arial, sans-serif;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        .login-box {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 320px;
            z-index: 2;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: none;
        }

        .circle-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            margin: -40px auto 10px auto;
            border: 4px solid white;
            background: white;
        }

        .circle-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        .welcome-text {
            position: absolute;
            top: 40%;
            left: 10%;
            color: white;
            z-index: 2;
        }

        .welcome-text h1 {
            font-size: 50px;
            font-weight: bold;
        }

        .welcome-text p {
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<!-- WELCOME TEXT -->
<div class="welcome-text">
    <h1>Welcome to WPG System</h1>
    <p>Furniture • Inventory • Sales • Business Management</p>
</div>

<!-- LOGIN BOX -->
<div class="login-box">
    <div class="card p-3">

        <!-- LOGO -->
        <div class="circle-img">
            <img src="{% static 'images/logo.ico' %}" alt="logo">
        </div>

        <!-- ERROR MESSAGES -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="close" data-dismiss="alert">
                        <span>&times;</span>
                    </button>
                </div>
            {% endfor %}
        {% endif %}

        <!-- FORM -->
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username">
            </div>

            <div class="form-group password-container">
                <label>Password</label>
                <input type="password" name="password" id="pass" class="form-control" placeholder="Enter password">

                <span id="togglePassword" class="toggle-password">
                    <i class="fa fa-eye"></i>
                </span>
            </div>

            <button type="submit" class="btn btn-success btn-block">
                Login
            </button>

            <div class="d-flex justify-content-between mt-3">
                <a href="{% url 'password_reset' %}" class="small text-muted">
                    Forgot password?
                </a>

                <a href="{% url 'registerUser' %}" class="small text-primary">
                    Create account
                </a>
            </div>
        </form>

    </div>
</div>

<!-- JS -->
<script>
const toggle = document.getElementById("togglePassword");
const pass = document.getElementById("pass");

if (toggle && pass) {
    toggle.addEventListener("click", function () {
        let icon = this.querySelector("i");

        if (pass.type === "password") {
            pass.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            pass.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    });
}
</script>

<!-- Bootstrap JS (for alerts close button) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
